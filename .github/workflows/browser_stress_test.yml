name: Browser Concurrent Stress Test

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      concurrent_browsers:
        description: 'Number of concurrent browsers to test'
        required: true
        default: '20'
        type: string
      
  # 定时触发（每天凌晨2点）
  schedule:
    - cron: '0 2 * * *'
  
  # PR触发（当测试用例相关文件变更时）
  pull_request:
    paths:
      - 'test_case_base/business_scenarios/multi_browser_concurrent_test.py'
      - 'test_case_base/business_scenarios/test_config.json'

jobs:
  stress-test:
    name: Run Browser Stress Test
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        concurrent: [5, 10, 20]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psutil
      
      - name: Run stress test (concurrent=${{ matrix.concurrent }})
        run: |
          cd test_case_base/business_scenarios
          python multi_browser_concurrent_test.py ${{ matrix.concurrent }}
        timeout-minutes: 30
      
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: browser-stress-test-report-concurrent-${{ matrix.concurrent }}
          path: test_case_base/business_scenarios/browser_concurrent_test_*.json
          retention-days: 30
      
      - name: Analyze results
        run: |
          cd test_case_base/business_scenarios
          latest_report=$(ls -t browser_concurrent_test_*.json | head -1)
          echo "Test report: $latest_report"
          
          # 提取关键指标
          peak_memory=$(python3 -c "import json; print(json.load(open('$latest_report'))['resource_usage']['peak_memory_percent'])")
          peak_cpu=$(python3 -c "import json; print(json.load(open('$latest_report'))['resource_usage']['peak_cpu_percent'])")
          
          echo "Peak Memory: ${peak_memory}%"
          echo "Peak CPU: ${peak_cpu}%"
          
          # 检查是否超过阈值
          if (( $(echo "$peak_memory > 95" | bc -l) )); then
            echo "❌ Memory usage exceeded 95%!"
            exit 1
          fi
          
          if (( $(echo "$peak_cpu > 95" | bc -l) )); then
            echo "❌ CPU usage exceeded 95%!"
            exit 1
          fi
          
          echo "✅ All metrics within acceptable range"

  summary:
    name: Test Summary
    needs: stress-test
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports
          pattern: browser-stress-test-report-*
      
      - name: Generate summary
        run: |
          echo "## Browser Stress Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          for report in reports/*/browser_concurrent_test_*.json; do
            echo "### $(dirname $report)" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
            cat $report | python3 -m json.tool >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done
